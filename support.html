  <h2>よくある質問</h2>
  <p><strong>Q. 写真が選べません</strong></p>
  <p>A. 端末の「設定」からアプリの写真アクセスを許可してください。</p>

  <p><strong>Q. マイフォトモードが使えません</strong></p>
  <p>A. ステージ1〜4を全てクリアすると解放されます。</p>

  <p><strong>Q. 音が出ません</strong></p>
  <p>A. 端末のマナーモードを解除し、アプリの設定画面で効果音・BGMがONになっているか確認してください。</p>
